<!DOCTYPE html>
<html>
<head>
  <title>My Basic Webpage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    p {
      font-size: 16px;
    }

    img {
      width: 300px;
      border-radius: 8px;
    }

    a {
      color: blue;
      text-decoration: none;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      background-color: #008cba;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005f6b;
    }
  </style>
</head>
<body>

  <h1>Welcome to My Page</h1>
  <p>This is a simple webpage created using HTML, styled with CSS, and made interactive with JavaScript.</p>

  <img src="c:\Users\chint\OneDrive\Pictures\360_F_176984023_8I82qQPmKn8TqNAZXIYMCSiwccoUiPBg.jpg" alt="Sample Image">

  <p>Visit <a href="https://www.google.com" target="_blank">Google</a> to search the web.</p>

  <p id="text">Click the button below to change this text.</p>
  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.getElementById("text").textContent = "The text has been changed!";
    }
  </script>

</body>
</html>
